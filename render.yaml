services:
  - type: web
    name: ftn-hackathon
    env: node
    branch: main
    buildCommand: bun install && NITRO_PRESET=render_com bun run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NITRO_PRESET
        value: render_com
      - key: VITE_API_URL
        value: https://calvaltec-backend.onrender.com
      - key: VITE_N8N_CHAT_WEBHOOK_URL
        value: https://smartteam2026.app.n8n.cloud/webhook/chat-assistant
